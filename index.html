<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trees Saved Header</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(1200px 600px at 10% -10%, #bbf7d0 0%, rgba(187,247,208,0) 60%),
                     radial-gradient(900px 500px at 110% 0%, #86efac 0%, rgba(134,239,172,0) 55%),
                     linear-gradient(135deg, #052e1d 0%, #06281a 100%);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.16);
      --text-primary: #ecfdf5;
      --text-secondary: #a7f3d0;
      --accent: #34d399;
      --accent-strong: #10b981;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    /* Reset-ish */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text-primary);
      background: var(--bg-gradient) fixed;
    }

    /* Header wrapper */
    .header {
      position: relative;
      padding: clamp(20px, 6vw, 64px) clamp(16px, 5vw, 48px);
      overflow: hidden;
      isolation: isolate;
    }

    /* Decorative blur blobs */
    .header::before,
    .header::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      z-index: -1;
    }
    .header::before {
      width: 420px; height: 420px;
      left: -120px; top: -160px;
      background: #22c55e;
    }
    .header::after {
      width: 500px; height: 500px;
      right: -160px; top: -140px;
      background: #0ea5e9;
    }

    /* Content constraint */
    .container {
      max-width: 1100px;
      margin-inline: auto;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: clamp(16px, 3vw, 32px);
      align-items: center;
    }

    @media (max-width: 820px) {
      .container { grid-template-columns: 1fr; }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-badge {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, #16a34a, #22c55e);
      color: white;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }

    .title {
      font-size: clamp(28px, 4.2vw, 48px);
      line-height: 1.05;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--text-secondary);
      font-size: clamp(14px, 1.8vw, 18px);
      max-width: 65ch;
    }

    /* Glass info card */
    .stat-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 18px 18px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .stat-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #86efac, #16a34a);
      box-shadow: 0 0 14px #16a34a;
      flex: 0 0 auto;
    }

    .stat-text {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .stat-strong {
      color: white;
      font-weight: 700;
    }

    /* Counter block */
    .counter-card {
      justify-self: end;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: clamp(16px, 3vw, 24px);
      min-width: 260px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
    }

    @media (max-width: 820px) {
      .counter-card { justify-self: stretch; }
    }

    .counter-icon {
      width: 54px; height: 54px;
      border-radius: 14px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, #065f46, #064e3b);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .counter-icon svg {
      width: 28px; height: 28px; color: #34d399;
    }

    .counter-meta {
      display: grid;
      gap: 6px;
    }

    .counter-label {
      color: var(--text-secondary);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .counter-value {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .counter-number {
      font-size: clamp(28px, 5.2vw, 44px);
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 0%, #d1fae5 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 30px rgba(52, 211, 153, 0.25);
    }

    .counter-unit {
      color: var(--text-secondary);
      font-size: clamp(14px, 2.2vw, 18px);
      font-weight: 600;
    }

    /* Call to action (optional) */
    .cta {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(145deg, #34d399, #10b981);
      color: #053321;
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(16,185,129,0.25);
      transition: transform .15s ease, filter .15s ease;
    }
    .cta:hover { transform: translateY(-1px); filter: brightness(1.03); }
    .cta:active { transform: translateY(0); filter: brightness(0.98); }
  </style>
</head>
<body>
  <header class="header" role="banner" aria-label="Trees saved header">
    <div class="container">
      <!-- Left side: Title & context -->
      <div>
        <div class="brand" aria-hidden="true">
          <div class="brand-badge" title="Sustainability">
            <!-- Leaf Glyph -->
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
              <path d="M4 14c5-8 11-10 16-10-1 5-3 11-10 16-3 2-6 0-6-3 0-1 0-2 0-3Z" stroke="white" stroke-width="1.5" />
            </svg>
          </div>
          <strong>Green Impact</strong>
        </div>

        <h1 class="title">Together, we’re growing a healthier city</h1>
        <p class="subtitle">
          Every step we take reduces waste and restores canopy cover. Here’s our current progress:
        </p>

        <div class="stat-card" role="status" aria-live="polite">
          <span class="stat-dot" aria-hidden="true"></span>
          <span class="stat-text">
            Latest update: <span class="stat-strong" id="updatedAt">just now</span>
          </span>
        </div>

        <!-- Optional CTA -->
        <button class="cta" type="button" id="ctaBtn" aria-label="Learn how we save more trees">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3v18M3 12h18" stroke="#053321" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Learn how
        </button>
      </div>

      <!-- Right side: Counter Card -->
      <section class="counter-card" aria-label="Trees saved to date">
        <div class="counter-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 2c3 0 7 3 7 7 0 4-2 6-5 8l2 3H8l2-3C7 15 5 13 5 9c0-4 4-7 7-7Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="counter-meta">
          <div class="counter-label">Trees saved</div>
          <div class="counter-value">
            <span class="counter-number" id="treesCounter">0</span>
            <span class="counter-unit">trees</span>
          </div>
        </div>
      </section>
    </div>
  </header>

  <script>
    /**
     * Animated counter to a target value.
     * @param {HTMLElement} el - element where number appears
     * @param {number} to - final value
     * @param {number} duration - ms
     */
    function animateCount(el, to, duration = 1200) {
      const start = 0;
      const startTime = performance.now();
      const formatter = new Intl.NumberFormat(undefined); // locale-aware commas

      function tick(now) {
        const t = Math.min(1, (now - startTime) / duration);
        // Ease-out cubic
        const eased = 1 - Math.pow(1 - t, 3);
        const current = Math.round(start + (to - start) * eased);
        el.textContent = formatter.format(current);
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Set the number of trees saved here:
    const TREES_SAVED = 100;

    // Init on load
    const counterEl = document.getElementById('treesCounter');
    animateCount(counterEl, TREES_SAVED, 1200);

    // Update timestamp
    const updatedAtEl = document.getElementById('updatedAt');
    const now = new Date();
    updatedAtEl.textContent = now.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });

    // Optional CTA action
    document.getElementById('ctaBtn').addEventListener('click', () => {
      alert('Ways to save more trees: reduce paper use, digitize workflows, plant native species, and monitor canopy health. 🌳');
    });
  </script>
</body>
</html>
