<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trees Saved – Gradient Card</title>
  <style>
    :root {
      /* Card palette (unchanged) */
      --grad-start: #27c6a3;
      --grad-end:   #2454a6;
      --card-shadow: 0 14px 28px rgba(4, 18, 44, 0.35);
      --inner-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      --pill-radius: 22px;
      --tile-radius: 14px;

      --ink-strong: #e8fff6;
      --ink-muted:  rgba(255,255,255,0.78);
      --ink-subtle: rgba(255,255,255,0.6);

      --tile-bg: #0e214e;
      --tile-glow: rgba(39, 198, 163, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      /* White page background as requested */
      background: #ffffff;
      /* remove big outer padding to eliminate visible space */
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #0f172a;
    }

    /* A simple container that keeps the card aligned without extra whitespace */
    .page-wrap {
      max-width: 960px;
      margin: 0 auto;          /* center horizontally with no top/bottom gap */
      padding: 0 16px;         /* tiny horizontal breathing room only */
    }

    /* Gradient card */
    .trees-card {
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      border-radius: var(--pill-radius);
      box-shadow: var(--card-shadow);
      padding: 18px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 18px;
      position: relative;
      isolation: isolate;

      /* keep it full-width within the container with no extra margins */
      width: 100%;
      margin: 0;               /* <-- remove any space above/below */
    }

    .trees-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: var(--inner-shadow);
      pointer-events: none;
    }

    /* Emoji logo tile */
    .logo-tile {
      background: linear-gradient(145deg, var(--tile-bg), #0a1f46);
      border-radius: var(--tile-radius);
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      box-shadow:
        0 10px 22px rgba(0,0,0,0.35),
        0 0 0 8px var(--tile-glow);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 32px;   /* emoji size */
      line-height: 1;
    }

    .stat-wrap { display: grid; gap: 6px; }
    .stat-label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-subtle);
      font-weight: 700;
    }
    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat-number {
      color: var(--ink-strong);
      font-weight: 900;
      font-size: clamp(28px, 5.2vw, 44px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .stat-unit {
      color: var(--ink-muted);
      font-weight: 700;
      font-size: clamp(16px, 2.1vw, 20px);
    }

    /* Mobile */
    @media (max-width: 520px) {
      .trees-card {
        gap: 14px;
        padding: 14px;
        border-radius: 18px;
      }
      .logo-tile { width: 56px; height: 56px; font-size: 28px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .countup-animated { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- No top/bottom whitespace; card sits flush inside a narrow container -->
  <div class="page-wrap">
    <section class="trees-card" aria-label="Trees saved">
      <div class="logo-tile" aria-hidden="true">🌳</div>

      <div class="stat-wrap">
        <div class="stat-label">Trees Saved</div>
        <div class="stat-row">
          <div class="stat-number">
            <span id="treesCount"
                  class="countup-animated"
                  data-target="300"
                  data-duration="1500"
                  data-suffix="">
              0
            </span>
          </div>
          <div class="stat-unit">trees</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const el = document.getElementById('treesCount');
      if (!el) return;

      const prefersReduced =
        window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const target   = Number(el.getAttribute('data-target') || 300);
      const duration = prefersReduced ? 0 : Number(el.getAttribute('data-duration') || 1500);
      const suffix   = el.getAttribute('data-suffix') || '';

      const easeOutQuad = t => t * (2 - t);
      const format = n => n.toLocaleString(undefined);

      function countUp(node, to, ms) {
        if (ms <= 0) { node.textContent = format(to) + suffix; return; }
        const start = performance.now();

        function frame(now) {
          const t = Math.min(1, (now - start) / ms);
          const val = Math.round(to * easeOutQuad(t));
          node.textContent = format(val) + suffix;
          if (t < 1) requestAnimationFrame(frame);
          else node.textContent = format(to) + suffix;
        }
        requestAnimationFrame(frame);
      }

      countUp(el, target, duration);
    })();
  </script>

</body>
</html>
