<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trees Saved Header</title>
  <style>
    :root{
      --bg: #ffffff;
      --text: #0f172a;            /* slate-900 */
      --muted: #475569;           /* slate-600 */
      --green: #1B5E20;           /* forest green */
      --green-600: #2e7d32;
      --card: #ffffff;
      --ring: rgba(27,94,32,.18);
      --shadow: 0 6px 20px rgba(2, 6, 23, 0.06);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #E8F5E9 0%, #FFFFFF 30%);
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--bg);
      border-bottom: 1px solid rgba(2, 6, 23, 0.04);
      box-shadow: 0 2px 12px rgba(2,6,23,0.04);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: 1fr auto; /* only the stat box on the right */
      align-items: center;
    }

    /* Trees Saved card */
    .stat-card {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid rgba(2, 6, 23, 0.06);
      border-radius: var(--radius);
      padding: 12px 16px;
      box-shadow: var(--shadow);
      min-width: 240px;
    }

    .stat-icon {
      height: 36px;
      width: 36px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(27,94,32,0.08);
      color: var(--green);
      border: 1px solid rgba(27,94,32,0.12);
      flex-shrink: 0;
      font-size: 18px;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .stat-number {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--green-600);
      letter-spacing: .2px;
    }

    /* Mobile: center the stat card and let it fill width */
    @media (max-width: 640px) {
      .header-inner {
        grid-template-columns: 1fr;
      }
      .stat-card {
        justify-self: stretch;
        width: 100%;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .countup-animated {
        transition: none !important;
        animation: none !important;
      }
    }

    /* Focus ring for accessibility when tabbing */
    .focus-ring:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <!-- (no logo) -->

      <!-- Trees Saved box -->
      <div class="stat-card focus-ring" role="status" aria-live="polite" tabindex="0" aria-label="Trees saved counter">
        <div class="stat-icon" aria-hidden="true">🌳</div>
        <div>
          <div class="stat-label">Trees Saved</div>
          <div class="stat-number">
            <span id="treesCount" class="countup-animated"
                  data-target="100"
                  data-duration="1600"
                  data-suffix="">
              0
            </span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <script>
    (function () {
      const el = document.getElementById('treesCount');
      if (!el) return;

      const prefersReduced =
        window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const target = Number(el.getAttribute('data-target') || 100);
      const duration = prefersReduced ? 0 : Number(el.getAttribute('data-duration') || 1600);
      const suffix = el.getAttribute('data-suffix') || '';

      // Easing function for a smooth finish
      function easeOutQuad(t) { return t * (2 - t); }

      function formatNumber(n) {
        return n.toLocaleString(undefined);
      }

      function animateCountUp(node, to, ms) {
        if (ms <= 0) {
          node.textContent = formatNumber(to) + suffix;
          return;
        }
        const start = performance.now();
        const from = 0;

        function frame(now) {
          const elapsed = now - start;
          const t = Math.min(1, elapsed / ms);
          const val = Math.round(from + (to - from) * easeOutQuad(t));
          node.textContent = formatNumber(val) + suffix;

          if (t < 1) {
            requestAnimationFrame(frame);
          } else {
            node.textContent = formatNumber(to) + suffix;
          }
        }
        requestAnimationFrame(frame);
      }

      animateCountUp(el, target, duration);
    })();
  </script>
</body>
</html>
