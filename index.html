<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trees Saved – Header (No Space / No Shadow)</title>
  <style>
    :root{
      /* Colors from your gradient card setup */
      --bg: #ffffff;                /* page background */
      --text: #0f172a;
      --muted: #475569;
      --grad-start: #27c6a3;        /* teal */
      --grad-end:   #2454a6;        /* blue */
      --radius: 22px;
      --tile-radius: 14px;
      --tile-bg-1: #0e214e;
      --tile-bg-2: #0a1f46;

      --ink-strong: #e8fff6;
      --ink-muted:  rgba(255,255,255,0.78);
      --ink-subtle: rgba(255,255,255,0.6);
    }

    /* Remove ALL outer space */
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }

    /* Header bar: no space, no shadow, no border */
    .site-header {
      position: sticky; top: 0; z-index: 40;
      background: var(--bg);
      border: 0;
      box-shadow: none;            /* removed */
      margin: 0;                   /* no gaps */
    }

    .header-inner {
      max-width: none;             /* full width */
      margin: 0;
      padding: 0;                  /* removed inner padding */
      display: grid;
      grid-template-columns: 1fr auto;   /* just the stat on the right */
      align-items: stretch;
      gap: 0;                      /* no gaps */
    }

    /* Trees Saved card (right-aligned) */
    .stat-card {
      justify-self: end;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      border: none;
      border-radius: var(--radius);
      padding: 14px 16px;

      /* remove any visual elevation */
      box-shadow: none;            /* removed */
      margin: 0;                   /* ensure no external gap */
    }

    .logo-tile {
      background: linear-gradient(145deg, var(--tile-bg-1), var(--tile-bg-2));
      border-radius: var(--tile-radius);
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 28px;             /* emoji size */
      line-height: 1;

      box-shadow: none;            /* removed */
    }

    .stat-label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-subtle);
      font-weight: 700;
      margin: 0;
    }

    .stat-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat-number {
      color: var(--ink-strong);
      font-weight: 900;
      font-size: clamp(26px, 4.6vw, 40px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: none;           /* ensure no shadow on text */
      margin: 0;
    }

    .stat-unit {
      color: var(--ink-muted);
      font-weight: 700;
      font-size: clamp(14px, 2vw, 18px);
      margin: 0;
    }

    /* Mobile: card stays full width on the right with no padding added */
    @media (max-width: 640px) {
      .header-inner { grid-template-columns: 1fr; }
      .stat-card { justify-self: stretch; border-radius: 18px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .countup-animated { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <header class="site-header" role="banner" aria-label="Trees saved header">
    <div class="header-inner">
      <!-- Only the stat box on the right -->
      <div class="stat-card" role="status" aria-live="polite" aria-label="Trees saved counter">
        <div class="logo-tile" aria-hidden="true">🌳</div>
        <div>
          <div class="stat-label">Trees Saved</div>
          <div class="stat-row">
            <div class="stat-number">
              <span id="treesCount" class="countup-animated"
                    data-target="300"
                    data-duration="1500"
                    data-suffix="">
                0
              </span>
            </div>
            <div class="stat-unit">trees</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <script>
    (function () {
      const el = document.getElementById('treesCount');
      if (!el) return;

      const prefersReduced =
        window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      const target   = Number(el.getAttribute('data-target') || 300);
      const duration = prefersReduced ? 0 : Number(el.getAttribute('data-duration') || 1500);
      const suffix   = el.getAttribute('data-suffix') || '';

      const easeOutQuad = t => t * (2 - t);
      const format = n => n.toLocaleString(undefined);

      function countUp(node, to, ms) {
        if (ms <= 0) { node.textContent = format(to) + suffix; return; }
        const start = performance.now();

        function frame(now) {
          const t = Math.min(1, (now - start) / ms);
          const val = Math.round(to * easeOutQuad(t));
          node.textContent = format(val) + suffix;
          if (t < 1) requestAnimationFrame(frame);
          else node.textContent = format(to) + suffix;
        }
        requestAnimationFrame(frame);
      }

      countUp(el, target, duration);
    })();
  </script>

</body>
</html>
